<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 256px;
    height: 256px;
    background: transparent;
    overflow: hidden;
  }
  .canvas {
    width: 256px;
    height: 256px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Rounded square base - dark video screen */
  .base {
    width: 196px;
    height: 196px;
    border-radius: 40px;
    background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
    position: absolute;
    box-shadow:
      0 6px 20px rgba(0, 0, 0, 0.5),
      0 0 0 3px rgba(255, 0, 51, 0.7),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
  }

  /* Play button - bottom-left */
  .play {
    position: absolute;
    bottom: 38px;
    left: 38px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 18px 0 18px 30px;
    border-color: transparent transparent transparent #ff0033;
    opacity: 0.8;
    filter: drop-shadow(0 0 6px rgba(255, 0, 51, 0.5));
  }

  /* Flowing comment bars - the main visual */
  .comment {
    position: absolute;
    height: 22px;
    border-radius: 3px;
    background: #ffffff;
    font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    font-weight: 900;
    font-size: 15px;
    line-height: 22px;
    color: #1a1a2e;
    padding: 0 6px;
    white-space: nowrap;
    letter-spacing: -0.5px;
  }

  /* Row 1 - top */
  .c1 {
    top: 52px;
    left: 24px;
    width: 120px;
    opacity: 1;
    background: #ffffff;
  }
  .c2 {
    top: 52px;
    left: 156px;
    width: 80px;
    opacity: 0.6;
    background: #ffffff;
  }

  /* Row 2 */
  .c3 {
    top: 82px;
    left: 54px;
    width: 160px;
    opacity: 0.9;
    background: #ff0033;
    color: #ffffff;
  }

  /* Row 3 */
  .c4 {
    top: 112px;
    left: 16px;
    width: 90px;
    opacity: 0.75;
  }
  .c5 {
    top: 112px;
    left: 118px;
    width: 130px;
    opacity: 0.5;
  }

  /* Row 4 */
  .c6 {
    top: 142px;
    left: 68px;
    width: 140px;
    opacity: 0.85;
  }

  /* Row 5 - bottom */
  .c7 {
    top: 172px;
    left: 30px;
    width: 100px;
    opacity: 0.4;
  }
  .c8 {
    top: 172px;
    left: 142px;
    width: 70px;
    opacity: 0.3;
  }

  /* Timestamp badge */
  .timestamp {
    position: absolute;
    bottom: 36px;
    right: 34px;
    background: rgba(255, 0, 51, 0.9);
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 5px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="base"></div>
    <!-- Flowing danmaku comments -->
    <div class="comment c1"></div>
    <div class="comment c2"></div>
    <div class="comment c3"></div>
    <div class="comment c4"></div>
    <div class="comment c5"></div>
    <div class="comment c6"></div>
    <div class="comment c7"></div>
    <div class="comment c8"></div>
    <!-- Play indicator -->
    <div class="play"></div>
    <!-- Timestamp badge -->
    <div class="timestamp">1:23</div>
  </div>
</body>
</html>
